version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conceptreel-backend
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --app-dir backend
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./content:/app/content
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - conceptreel-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conceptreel-frontend
    command: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - conceptreel-network

networks:
  conceptreel-network:
    driver: bridge
